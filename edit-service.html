<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Editar servicio - GasApp</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <header class="modal-header">
            <button class="close-btn" onclick="location.href='index.html'">✕</button>
            <h2>✏️ Editar servicio</h2>
        </header>

        <form id="editServiceForm" class="form-card">
            <input type="hidden" id="editServiceId">
            
            <div class="form-group">
                <label>📅 Fecha</label>
                <input type="date" id="editServiceDate" required>
            </div>

            <div class="form-group">
                <label>🔧 Tipo de servicio</label>
                <select id="editServiceType" required>
                    <option value="Cambio de aceite">Cambio de aceite</option>
                    <option value="Cambio de frenos">Cambio de frenos</option>
                    <option value="Cambio de filtros">Cambio de filtros</option>
                    <option value="Alineación">Alineación</option>
                    <option value="Neumáticos">Neumáticos</option>
                    <option value="Otro">Otro</option>
                </select>
            </div>

            <div class="form-group">
                <label>📟 Odómetro actual (km)</label>
                <input type="number" id="editServiceOdometer" required step="1">
            </div>

            <div class="form-group">
                <label>📅 Próximo servicio (km)</label>
                <input type="number" id="editServiceNextKm" required step="1">
            </div>

            <div class="form-group">
                <label>📝 Notas</label>
                <input type="text" id="editServiceNotes" placeholder="Ej: Aceite sintético 5W-30">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">💾 Actualizar</button>
                <button type="button" class="btn-danger" id="deleteServiceBtn">🗑️ Eliminar</button>
            </div>
        </form>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/db.js"></script>
    <script src="js/edit-service.js"></script>
</body>
</html>
