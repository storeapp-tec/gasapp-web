<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⛽ GasApp</title>
    <style>
        /* ESTILOS (mantener los mismos que ya tenías) */
        /* ... (copiar los estilos de tu versión anterior) ... */
    </style>
</head>
<body>

    <div class="app">
        <!-- HEADER, TABS, MODALES (mantener igual) -->
    </div>

    <script>
        // ============================================================
        // CONFIGURACIÓN
        // ============================================================
        const URL_API = 'https://script.google.com/macros/s/AKfycbwSHz8rsAm9KSobCZowVM-OtNTKUNwdYpkagFlVVA83FRovSiP6BmhVsQabAc-mH_CM/exec';
        let appData = { carName: 'Mi Auto', manualOdometer: null, fuels: [], services: [] };
        const mesesNombres = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];
        let toastTimeout = null;
        let isSaving = false;
        let confirmCallback = null;

        // ============================================================
        // TOAST
        // ============================================================
        function showToast(message, type = 'success', duration = 2500) {
            const toast = document.getElementById('toast');
            clearTimeout(toastTimeout);
            
            let icon = '';
            switch(type) {
                case 'success': icon = '✅'; break;
                case 'error': icon = '❌'; break;
                case 'saving': icon = '⏳'; break;
                case 'delete': icon = '🗑️'; break;
                case 'warning': icon = '⚠️'; break;
                default: icon = '📌';
            }
            
            toast.innerHTML = `<span class="icon">${icon}</span> ${message}`;
            toast.className = type + ' show';
            
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        // ============================================================
        // MODAL DE CONFIRMACIÓN BONITO
        // ============================================================
        function showConfirmModal(message, onConfirm) {
            const modal = document.getElementById('confirmModal');
            const msg = document.getElementById('confirmMessage');
            
            closeConfirmModal();
            
            msg.textContent = message || 'Esta acción no se puede deshacer.';
            modal.classList.add('show');
            confirmCallback = onConfirm;
            
            const deleteBtn = document.getElementById('confirmDeleteBtn');
            const newDeleteBtn = deleteBtn.cloneNode(true);
            deleteBtn.parentNode.replaceChild(newDeleteBtn, deleteBtn);
            
            newDeleteBtn.addEventListener('click', function() {
                if (confirmCallback) {
                    const callback = confirmCallback;
                    closeConfirmModal();
                    setTimeout(callback, 200);
                }
            });
        }

        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.remove('show');
            confirmCallback = null;
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeConfirmModal();
        });

        document.getElementById('confirmModal').addEventListener('click', function(e) {
            if (e.target === this) closeConfirmModal();
        });

        // ============================================================
        // FORMATO DE FECHAS
        // ============================================================
        function formatDateShort(d) {
            if (!d) return '';
            if (typeof d === 'string' && d.includes('GMT')) {
                try {
                    const date = new Date(d);
                    if (isNaN(date.getTime())) return d;
                    const day = String(date.getDate()).padStart(2, '0');
                    const month = mesesNombres[date.getMonth()];
                    const year = String(date.getFullYear()).slice(2);
                    return `${day}-${month}-${year}`;
                } catch(e) { return d; }
            }
            if (d instanceof Date) {
                try {
                    const day = String(d.getDate()).padStart(2, '0');
                    const month = mesesNombres[d.getMonth()];
                    const year = String(d.getFullYear()).slice(2);
                    return `${day}-${month}-${year}`;
                } catch(e) { return d.toString(); }
            }
            if (typeof d === 'string' && d.match(/^\d{4}-\d{2}-\d{2}/)) {
                try {
                    const parts = d.split('-');
                    return `${parts[2]}-${mesesNombres[parseInt(parts[1])-1]}-${parts[0].substring(2)}`;
                } catch(e) { return d; }
            }
            return d;
        }

        function formatDateForExcel(d) {
            if (!d) return '';
            if (typeof d === 'string' && d.match(/^\d{4}-\d{2}-\d{2}/)) return d;
            if (d instanceof Date) return d.toISOString().split('T')[0];
            if (typeof d === 'string' && d.includes('GMT')) {
                try {
                    const date = new Date(d);
                    return date.toISOString().split('T')[0];
                } catch(e) { return d; }
            }
            return d;
        }

        // ============================================================
        // FUNCIONES DE FORMATO
        // ============================================================
        function formatNumber(n) { return new Intl.NumberFormat('es-MX').format(n); }
        function getCurrentOdometer() { 
            if (appData.manualOdometer !== null && appData.manualOdometer > 0) return appData.manualOdometer;
            if (appData.fuels.length) return Math.max(...appData.fuels.map(f => f.odometer));
            return 0; 
        }
        function getLastFuelOdometer() {
            if (!appData.fuels.length) return 0;
            return appData.fuels[appData.fuels.length - 1].odometer;
        }
        function getLastFuelPrice() {
            if (!appData.fuels.length) return 0;
            return appData.fuels[appData.fuels.length - 1].pricePerLiter || 0;
        }

        function calculateChrono(fuels) {
            if (!fuels.length) return [];
            return fuels.map((f, i) => {
                if (i === 0) return { ...f, kmDiff: 0, avg: null };
                let diff = f.odometer - fuels[i-1].odometer;
                let totalKm = f.odometer - fuels[0].odometer;
                let totalLit = fuels.slice(0, i).reduce((s, x) => s + x.liters, 0);
                return { ...f, kmDiff: diff, avg: (totalKm > 0 && totalLit > 0) ? totalKm / totalLit : null };
            });
        }

        function getStatusProps(v) {
            if (!v) return { class: 'badge-none', icon: '🔵' };
            if (v >= 10.0) return { class: 'badge-good', icon: '🟢' };
            if (v >= 8.5) return { class: 'badge-warn', icon: '🔸' };
            return { class: 'badge-bad', icon: '🔴' };
        }

        // ============================================================
        // EXCEL SYNC
        // ============================================================
        async function callAction(action, data) {
            if (isSaving) {
                showToast('⏳ Espera...', 'warning');
                return null;
            }
            isSaving = true;
            showToast('⏳ Procesando...', 'saving');
            
            try {
                const payload = { accion: action, datos: data };
                console.log('📤 Enviando:', payload);
                
                await fetch(URL_API, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                showToast('✅ Operación completada', 'success');
                return { status: 'OK' };
            } catch (error) {
                console.error('❌ Error:', error);
                showToast('❌ Error: ' + error.message, 'error');
                return { status: 'ERROR', mensaje: error.message };
            } finally {
                isSaving = false;
            }
        }

        async function loadData() {
            showToast('⏳ Cargando datos...', 'saving', 3000);
            try {
                const response = await fetch(URL_API);
                const data = await response.json();
                console.log('📥 Datos cargados:', data);
                
                if (data && data.fuels && Array.isArray(data.fuels)) {
                    appData = data;
                    if (!appData.services) appData.services = [];
                    if (!appData.fuels) appData.fuels = [];
                    if (!appData.carName) appData.carName = 'Mi Auto';
                    
                    appData.fuels.forEach(f => { if (!f.id) f.id = 'f_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6); });
                    appData.services.forEach(s => { if (!s.id) s.id = 's_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6); });
                    
                    updateUI();
                    showToast('✅ Datos cargados', 'success');
                } else {
                    appData = { carName: 'Mi Auto', manualOdometer: null, fuels: [], services: [] };
                    updateUI();
                    showToast('📝 Sin datos previos', 'warning');
                }
            } catch (e) {
                console.error('Error al cargar:', e);
                showToast('❌ Error al cargar datos', 'error');
                appData = { carName: 'Mi Auto', manualOdometer: null, fuels: [], services: [] };
                updateUI();
            }
        }

        // ============================================================
        // UPDATE UI
        // ============================================================
        function updateUI() {
            try {
                const fuels = appData.fuels || [];
                fuels.sort((a, b) => new Date(a.date) - new Date(b.date));
                const chrono = calculateChrono(fuels);
                const view = [...chrono].reverse();

                document.getElementById('carNameDisplay').innerText = appData.carName || 'Mi Auto';
                document.getElementById('mainOdometer').innerText = formatNumber(getCurrentOdometer());

                // INICIO
                const latest = document.getElementById('latestFuelContainer');
                if (view.length === 0) {
                    latest.innerHTML = `<div class="empty-state-mini">No hay registros</div>`;
                } else {
                    latest.innerHTML = view.slice(0, 5).map(f => {
                        let p = getStatusProps(f.avg);
                        let disp = f.avg ? f.avg.toFixed(1) + " km/L" : "Inicial";
                        return `<div class="single-line-fuel" onclick="openEditFuel('${f.id}')">
                            <span>📅 ${formatDateShort(f.date)}</span>
                            <span>⛽ ${f.liters.toFixed(1)}L</span>
                            <span>💰 $${formatNumber(f.totalCost.toFixed(2))}</span>
                            <span>${p.icon} ${disp}</span>
                        </div>`;
                    }).join('');
                }

                // HISTORIAL
                const sel = document.getElementById('monthSelect').value || 'todos';
                let mSet = new Set(); 
                fuels.forEach(f => { if(f.date) mSet.add(f.date.substring(0,7)); });
                let mHtml = '<option value="todos">Todos los meses</option>';
                Array.from(mSet).sort().reverse().forEach(m => {
                    let p = m.split('-'); 
                    if(p.length === 2) mHtml += `<option value="${m}">${mesesNombres[parseInt(p[1])-1]} ${p[0]}</option>`;
                });
                document.getElementById('monthSelect').innerHTML = mHtml; 
                document.getElementById('monthSelect').value = sel;

                let fView = sel === "todos" ? view : view.filter(f => f.date && f.date.startsWith(sel));
                let fChrono = sel === "todos" ? chrono : chrono.filter(f => f.date && f.date.startsWith(sel));

                let km = fChrono.reduce((s, f) => s + (f.kmDiff || 0), 0);
                let cost = fChrono.reduce((s, f) => s + (f.totalCost || 0), 0);
                let lit = fChrono.reduce((s, f) => s + (f.liters || 0), 0);
                
                document.getElementById('summaryKm').innerText = formatNumber(km) + ' km';
                document.getElementById('summaryTotal').innerText = '$' + formatNumber(cost.toFixed(2));
                document.getElementById('summaryLiters').innerText = lit.toFixed(1) + ' L';
                document.getElementById('summaryAvg').innerText = (km>0 && lit>0) ? (km/lit).toFixed(1)+' km/L' : '0.0';

                const historyList = document.getElementById('historyList');
                if (fView.length === 0) {
                    historyList.innerHTML = `<div class="empty-state-mini">Sin registros</div>`;
                } else {
                    historyList.innerHTML = fView.map(f => {
                        let p = getStatusProps(f.avg);
                        let disp = f.avg ? f.avg.toFixed(1) + ' km/L' : 'Inicial';
                        let diffDisplay = f.kmDiff > 0 ? `+${f.kmDiff}` : '';
                        return `
                        <div class="history-item-compact" onclick="openEditFuel('${f.id}')">
                            <div class="history-row1">
                                <span class="history-date">📅 ${formatDateShort(f.date)}</span>
                                <span class="history-km">${formatNumber(f.odometer)} km</span>
                                <span class="history-km-right" style="color:#10b981; font-weight:700;">${diffDisplay}</span>
                            </div>
                            <div class="history-row2">
                                <span>⛽ ${f.liters.toFixed(1)}L</span>
                                <span class="history-consumption-badge ${p.class}">${p.icon} ${disp}</span>
                                <span style="font-weight:700; text-align:right;">💰 $${f.totalCost.toFixed(2)}</span>
                            </div>
                        </div>`;
                    }).join('');
                }

                // SERVICIOS
                const services = appData.services || [];
                const slist = document.getElementById('servicesList');
                if (services.length === 0) {
                    slist.innerHTML = `<div class="empty-state-mini">No hay servicios programados</div>`;
                } else {
                    const currentOdo = getCurrentOdometer();
                    const sortedServices = [...services].sort((a, b) => {
                        if (a.status === 'pendiente' && b.status !== 'pendiente') return -1;
                        if (a.status !== 'pendiente' && b.status === 'pendiente') return 1;
                        return a.serviceOdometer - b.serviceOdometer;
                    });

                    let pendientesHtml = '';
                    let realizadosHtml = '';

                    sortedServices.forEach(s => {
                        const diff = s.serviceOdometer - currentOdo;
                        let kmClass, kmDisplay;

                        if (s.status === 'realizado') {
                            kmClass = 'done';
                            kmDisplay = '✅ Realizado';
                        } else {
                            if (diff > 1000) { kmClass = 'green'; kmDisplay = `🟢 ${formatNumber(diff)} km`; }
                            else if (diff > 500) { kmClass = 'yellow'; kmDisplay = `🟡 ${formatNumber(diff)} km`; }
                            else { kmClass = 'red'; kmDisplay = diff > 0 ? `🔴 ${formatNumber(diff)} km` : '🔴 VENCIDO'; }
                        }

                        const itemHtml = `
                            <div class="service-item">
                                <div class="service-row">
                                    <div class="service-info">
                                        <span class="service-date">📅 ${formatDateShort(s.date)}</span>
                                        <span class="service-type">${s.type}</span>
                                        <span class="service-km-restante ${kmClass}">${kmDisplay}</span>
                                        <span class="service-odo-final">📌 ${formatNumber(s.serviceOdometer)} km</span>
                                    </div>
                                    <div class="service-actions">
                                        ${s.status === 'pendiente' ? `<button class="service-btn edit" onclick="openEditService('${s.id}')" title="Editar">✏️</button>` : ''}
                                        <button class="service-btn delete" onclick="requestDeleteService('${s.id}')" title="Eliminar">✕</button>
                                    </div>
                                </div>
                                ${s.status === 'pendiente' ? 
                                    `<div class="service-row" style="margin-top:4px;">
                                        <button class="service-btn done-btn" onclick="requestMarkDone('${s.id}')">✅ Marcar realizado</button>
                                        <span class="service-status-badge status-pendiente">⏳ Pendiente</span>
                                    </div>` :
                                    `<div class="service-row" style="margin-top:4px;">
                                        <span class="service-status-badge status-realizado">✅ Realizado</span>
                                    </div>`
                                }
                            </div>
                        `;

                        if (s.status === 'pendiente') pendientesHtml += itemHtml;
                        else realizadosHtml += itemHtml;
                    });

                    let finalHtml = '';
                    if (pendientesHtml) finalHtml += `<div style="font-size:12px; font-weight:600; color:#666; margin-bottom:6px; margin-top:4px;">📌 Pendientes</div>${pendientesHtml}`;
                    if (realizadosHtml) finalHtml += `<div style="font-size:12px; font-weight:600; color:#666; margin-bottom:6px; margin-top:12px;">✅ Realizados</div>${realizadosHtml}`;
                    slist.innerHTML = finalHtml;
                }

                // FAB
                const activeTab = document.querySelector('.tab-content.active');
                const fab = document.getElementById('fabBtn');
                if (activeTab && activeTab.id === 'tab-inicio') fab.classList.remove('hidden');
                else fab.classList.add('hidden');

            } catch (error) {
                console.error('Error en updateUI:', error);
                showToast('❌ Error al mostrar datos', 'error');
            }
        }

        // ============================================================
        // NAVEGACIÓN
        // ============================================================
        document.querySelectorAll('.nav-item').forEach(item => {
            item.onclick = function() {
                document.querySelectorAll('.nav-item, .tab-content').forEach(el => el.classList.remove('active'));
                this.classList.add('active');
                document.getElementById('tab-'+this.dataset.tab).classList.add('active');
                document.getElementById('appTitle').innerText = this.querySelector('.nav-label').innerText;
                updateUI();
            };
        });

        // ============================================================
        // MODALES
        // ============================================================
        function toggleModal(id, act) { 
            document.getElementById(id).classList[act === 'open' ? 'add' : 'remove']('active'); 
        }

        // ============================================================
        // FUEL CRUD
        // ============================================================
        function openNewFuel() { 
            document.getElementById('fuelForm').reset(); 
            document.getElementById('editFuelIndex').value = ''; 
            document.getElementById('fuelDate').value = new Date().toISOString().split('T')[0]; 
            document.getElementById('deleteFuelBtn').style.display = 'none'; 
            document.getElementById('fuelModalTitle').innerText = 'Nueva Carga';
            document.getElementById('liveTotal').innerText = '$0.00';
            document.getElementById('fuelOdometer').value = getLastFuelOdometer();
            document.getElementById('fuelPrice').value = getLastFuelPrice();
            toggleModal('fuelModal','open'); 
        }

        async function saveFuel() {
            let id = document.getElementById('editFuelIndex').value;
            let l = parseFloat(document.getElementById('fuelLiters').value); 
            let p = parseFloat(document.getElementById('fuelPrice').value);
            let dateValue = document.getElementById('fuelDate').value;
            let odo = parseInt(document.getElementById('fuelOdometer').value);
            
            const data = {
                date: dateValue,
                odometer: odo,
                liters: l,
                pricePerLiter: p,
                totalCost: l * p
            };
            
            if (id) {
                // EDITAR - Buscar el registro existente por ID
                const oldFuel = appData.fuels.find(f => f.id === id);
                if (oldFuel) {
                    const updateData = {
                        odometer: oldFuel.odometer, // Identificador
                        newDate: dateValue,
                        newOdometer: odo,
                        newLiters: l,
                        newPricePerLiter: p,
                        newTotalCost: l * p
                    };
                    const result = await callAction('updateFuel', updateData);
                    if (result && result.status === 'OK') {
                        // Actualizar en appData
                        const idx = appData.fuels.findIndex(f => f.id === id);
                        if (idx !== -1) {
                            appData.fuels[idx] = { ...data, id: id };
                        }
                        toggleModal('fuelModal','close');
                        updateUI();
                        showToast('✅ Carga actualizada', 'success');
                    }
                }
            } else {
                // NUEVO
                const result = await callAction('addFuel', data);
                if (result && result.status === 'OK') {
                    appData.fuels.push({ ...data, id: 'f_' + Date.now() });
                    await callAction('updateOdometer', { manualOdometer: odo });
                    appData.manualOdometer = odo;
                    toggleModal('fuelModal','close');
                    updateUI();
                    showToast('✅ Carga guardada', 'success');
                }
            }
        }

        function openEditFuel(id) {
            const f = appData.fuels.find(x => x.id === id); 
            if(!f) return;
            document.getElementById('editFuelIndex').value = f.id;
            document.getElementById('fuelOdometer').value = f.odometer;
            document.getElementById('fuelLiters').value = f.liters;
            document.getElementById('fuelPrice').value = f.pricePerLiter;
            document.getElementById('fuelDate').value = f.date;
            document.getElementById('deleteFuelBtn').style.display = 'block';
            document.getElementById('fuelModalTitle').innerText = 'Editar Carga';
            document.getElementById('liveTotal').innerText = '$'+(f.liters*f.pricePerLiter).toFixed(2);
            toggleModal('fuelModal','open');
        }

        document.getElementById('deleteFuelBtn').onclick = function() {
            const id = document.getElementById('editFuelIndex').value;
            const fuel = appData.fuels.find(f => f.id === id);
            if (fuel) {
                toggleModal('fuelModal','close');
                showConfirmModal(
                    `¿Eliminar la carga del ${formatDateShort(fuel.date)} con ${fuel.liters}L?`,
                    async function() {
                        const result = await callAction('deleteFuel', {
                            date: formatDateForExcel(fuel.date),
                            odometer: fuel.odometer
                        });
                        if (result && result.status === 'OK') {
                            appData.fuels = appData.fuels.filter(f => f.id !== id);
                            updateUI();
                            showToast('🗑️ Registro eliminado', 'delete');
                        } else {
                            showToast('❌ Error al eliminar', 'error');
                        }
                    }
                );
            }
        };

        document.getElementById('fuelLiters').oninput = document.getElementById('fuelPrice').oninput = function() {
            let l = parseFloat(document.getElementById('fuelLiters').value) || 0; 
            let p = parseFloat(document.getElementById('fuelPrice').value) || 0;
            document.getElementById('liveTotal').innerText = '$'+(l*p).toFixed(2);
        };

        // ============================================================
        // ODÓMETRO
        // ============================================================
        function openOdoModal() {
            document.getElementById('odoInput').value = getCurrentOdometer();
            toggleModal('odoModal','open');
        }

        async function saveManualOdo() { 
            let odo = parseInt(document.getElementById('odoInput').value);
            if(odo > 0) { 
                const result = await callAction('updateOdometer', { manualOdometer: odo });
                if (result && result.status === 'OK') {
                    appData.manualOdometer = odo;
                    toggleModal('odoModal','close');
                    updateUI();
                    showToast('✅ Odómetro actualizado', 'success');
                } else {
                    showToast('❌ Error al guardar', 'error');
                }
            }
        }

        // ============================================================
        // NOMBRE
        // ============================================================
        function openNameModal() {
            document.getElementById('carNameInput').value = appData.carName || 'Mi Auto';
            toggleModal('nameModal','open');
        }

        async function saveCarName() { 
            let name = document.getElementById('carNameInput').value.trim();
            if(name) { 
                const result = await callAction('updateCarName', { carName: name });
                if (result && result.status === 'OK') {
                    appData.carName = name;
                    toggleModal('nameModal','close');
                    updateUI();
                    showToast('✅ Nombre actualizado', 'success');
                } else {
                    showToast('❌ Error al guardar', 'error');
                }
            }
        }

        // ============================================================
        // SERVICIOS - CON EDICIÓN FUNCIONAL
        // ============================================================
        function openServiceModal() {
            document.getElementById('serviceForm').reset();
            document.getElementById('editServiceId').value = '';
            document.getElementById('serviceModalTitle').innerText = 'Agregar Servicio';
            document.getElementById('serviceSaveBtn').innerText = 'Guardar Servicio';
            document.getElementById('serviceDate').value = new Date().toISOString().split('T')[0];
            const currentOdo = getCurrentOdometer();
            document.getElementById('serviceOdometer').value = currentOdo;
            toggleModal('serviceModal','open');
        }

        function openEditService(id) {
            const service = appData.services.find(s => s.id === id);
            if (!service) return;
            
            document.getElementById('editServiceId').value = id;
            document.getElementById('serviceModalTitle').innerText = 'Editar Servicio';
            document.getElementById('serviceSaveBtn').innerText = 'Actualizar Servicio';
            document.getElementById('serviceType').value = service.type;
            document.getElementById('serviceOdometer').value = service.serviceOdometer;
            document.getElementById('serviceDate').value = service.date;
            toggleModal('serviceModal','open');
        }

        async function saveService() {
            const id = document.getElementById('editServiceId').value;
            let type = document.getElementById('serviceType').value.trim();
            let odo = parseInt(document.getElementById('serviceOdometer').value);
            let dateValue = document.getElementById('serviceDate').value;
            const currentOdo = getCurrentOdometer();
            
            if (odo <= currentOdo) {
                showToast('❌ El odómetro debe ser mayor al actual', 'error');
                return;
            }
            
            if(type && odo > 0 && dateValue) {
                const data = {
                    date: dateValue,
                    serviceOdometer: odo,
                    type: type,
                    status: 'pendiente'
                };
                
                if (id) {
                    // EDITAR
                    const oldService = appData.services.find(s => s.id === id);
                    if (oldService) {
                        const updateData = {
                            type: oldService.type,
                            serviceOdometer: oldService.serviceOdometer,
                            newDate: dateValue,
                            newServiceOdometer: odo,
                            newType: type,
                            newStatus: 'pendiente'
                        };
                        const result = await callAction('updateService', updateData);
                        if (result && result.status === 'OK') {
                            const idx = appData.services.findIndex(s => s.id === id);
                            if (idx !== -1) {
                                appData.services[idx] = { ...data, id: id };
                            }
                            toggleModal('serviceModal','close');
                            updateUI();
                            showToast('✅ Servicio actualizado', 'success');
                        }
                    }
                } else {
                    // NUEVO
                    const result = await callAction('addService', data);
                    if (result && result.status === 'OK') {
                        appData.services.push({ ...data, id: 's_' + Date.now() });
                        toggleModal('serviceModal','close');
                        updateUI();
                        showToast('✅ Servicio guardado', 'success');
                    } else {
                        showToast('❌ Error al guardar', 'error');
                    }
                }
            }
        }

        function requestDeleteService(id) {
            const service = appData.services.find(s => s.id === id);
            if (service) {
                showConfirmModal(
                    `¿Eliminar el servicio "${service.type}" programado a ${formatNumber(service.serviceOdometer)} km?`,
                    async function() {
                        const result = await callAction('deleteService', {
                            type: service.type,
                            serviceOdometer: service.serviceOdometer
                        });
                        if (result && result.status === 'OK') {
                            appData.services = appData.services.filter(s => s.id !== id);
                            updateUI();
                            showToast('🗑️ Servicio eliminado', 'delete');
                        } else {
                            showToast('❌ Error al eliminar', 'error');
                        }
                    }
                );
            }
        }

        function requestMarkDone(id) {
            const service = appData.services.find(s => s.id === id);
            if (service) {
                showConfirmModal(
                    `¿Marcar "${service.type}" como REALIZADO?`,
                    async function() {
                        const result = await callAction('markServiceDone', {
                            type: service.type,
                            serviceOdometer: service.serviceOdometer
                        });
                        if (result && result.status === 'OK') {
                            service.status = 'realizado';
                            updateUI();
                            showToast('✅ Servicio marcado como realizado', 'success');
                        } else {
                            showToast('❌ Error al actualizar', 'error');
                        }
                    }
                );
            }
        }

        // ============================================================
        // FILTRO MESES
        // ============================================================
        document.getElementById('monthSelect').addEventListener('change', function() {
            updateUI();
        });

        // ============================================================
        // INICIO
        // ============================================================
        window.onload = loadData;
    </script>
</body>
</html>
