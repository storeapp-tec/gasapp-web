<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Historial</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app">
        <header class="header-modal">
            <button class="btn-back" onclick="location.href='index.html'">‹</button>
            <span class="modal-title">Historial</span>
            <span></span>
        </header>

        <!-- Resumen compacto -->
        <div class="summary-row">
            <div class="summary-item">
                <span class="sum-label">Mes</span>
                <span class="sum-value" id="summaryMonth">---</span>
            </div>
            <div class="summary-item">
                <span class="sum-label">Gastos</span>
                <span class="sum-value" id="summaryTotal">$0</span>
            </div>
            <div class="summary-item">
                <span class="sum-label">Litros</span>
                <span class="sum-value" id="summaryLiters">0 L</span>
            </div>
            <div class="summary-item">
                <span class="sum-label">Promedio</span>
                <span class="sum-value" id="summaryAvg">0 km/L</span>
            </div>
        </div>

        <!-- Selector de mes con dropdown -->
        <div class="month-selector-compact">
            <select id="monthSelect" class="month-dropdown">
                <!-- Se llena con JS -->
            </select>
        </div>

        <!-- Lista de registros -->
        <div id="historyList" class="history-list-compact">
            <div class="empty-state-mini">Sin registros</div>
        </div>

        <nav class="bottom-nav-mini">
            <button class="nav-item" onclick="location.href='index.html'">
                <span>📊</span>
                <span>Inicio</span>
            </button>
            <button class="nav-item active" onclick="location.href='history.html'">
                <span>📈</span>
                <span>Historial</span>
            </button>
            <button class="nav-item" onclick="location.href='index.html'">
                <span>🔧</span>
                <span>Servicios</span>
            </button>
        </nav>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/db.js"></script>
    <script src="js/history.js"></script>
</body>
</html>
