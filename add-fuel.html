<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nueva carga</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app">
        <header class="header-modal">
            <button class="btn-back" onclick="location.href='index.html'">‹</button>
            <span class="modal-title">Nueva carga</span>
            <span></span>
        </header>

        <form id="fuelForm" class="form-compact">
            <div class="field-group">
                <label>Fecha</label>
                <input type="date" id="fuelDate" required>
            </div>

            <div class="field-group">
                <label>Odómetro (km)</label>
                <input type="number" id="fuelOdometer" placeholder="Ej: 179652" required step="1">
                <small class="hint" id="odoHint">Último: --</small>
            </div>

            <div class="field-row">
                <div class="field-group half">
                    <label>Litros</label>
                    <input type="number" id="fuelLiters" placeholder="40.5" required step="0.01">
                </div>
                <div class="field-group half">
                    <label>Precio $/L</label>
                    <input type="number" id="fuelPrice" placeholder="23.66" required step="0.01">
                    <small class="hint" id="lastPriceHint">Último: $---</small>
                </div>
            </div>

            <div class="total-box">
                <span>Total</span>
                <span class="total-amount" id="totalCost">$0.00</span>
            </div>

            <button type="submit" class="btn-primary-full">Guardar carga</button>
        </form>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/db.js"></script>
    <script src="js/add-fuel.js"></script>
</body>
</html>
