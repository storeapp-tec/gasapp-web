<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Editar servicio</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app">
        <header class="header-modal">
            <button class="btn-back" onclick="location.href='index.html'">‹</button>
            <span class="modal-title">Editar servicio</span>
            <span></span>
        </header>

        <form id="editServiceForm" class="form-compact">
            <input type="hidden" id="editServiceId">

            <div class="field-group">
                <label>Fecha</label>
                <input type="date" id="editServiceDate" required>
            </div>

            <div class="field-group">
                <label>Tipo</label>
                <select id="editServiceType" required>
                    <option value="Cambio de aceite">Cambio de aceite</option>
                    <option value="Cambio de frenos">Cambio de frenos</option>
                    <option value="Cambio de filtros">Cambio de filtros</option>
                    <option value="Alineación">Alineación</option>
                    <option value="Neumáticos">Neumáticos</option>
                    <option value="Otro">Otro</option>
                </select>
            </div>

            <div class="field-group">
                <label>Odómetro actual (km)</label>
                <input type="number" id="editServiceOdometer" required step="1">
            </div>

            <div class="field-group">
                <label>Próximo servicio (km)</label>
                <input type="number" id="editServiceNextKm" required step="1">
            </div>

            <div class="field-group">
                <label>Notas</label>
                <input type="text" id="editServiceNotes" placeholder="Aceite sintético 5W-30">
            </div>

            <div class="form-actions-row">
                <button type="submit" class="btn-primary-full">Actualizar</button>
                <button type="button" class="btn-danger-full" id="deleteServiceBtn">Eliminar</button>
            </div>
        </form>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/db.js"></script>
    <script src="js/edit-service.js"></script>
</body>
</html>
